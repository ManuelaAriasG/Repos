<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj</title>
    <style>

        body {
  display: flex;
  justify-content: center;
  align-items: center;
  position: fixed;
  height: 100px;
  margin: 0;
  background-image: url('https://cssanimation.rocks/images/posts/clocks/ios_clock.svg');
  background-repeat: no-repeat;
  background-size: 100px;
  background-attachment: fixed;
  background-position: center;
  top: 50%;
  left: 50%; 
  transform: translate(-50%, -50%);
  border-radius: 50%;
  
}

.reloj {
  width: 100px;
  height: 100px;
  position: absolute;
  border-radius: 50%;
}

.horario, .minutero, .segundero, .centro {
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom;
  transform: translateX(-50%) rotate(0deg);
}

.horario {
  width: 2.5px;
  height: 20px;
  background-color: rgb(9, 2, 107);
  border-radius: 3px;
  z-index: 1;
}

.minutero {
  width: 2px;
  height: 30px;
  background-color: rgb(74, 142, 245);
  border-radius: 2px;
  z-index: 2;
}

.segundero {
  width: 1px;
  height: 40px;
  background-color: red;
  border-radius: 1px;
  z-index: 3; /*  esto sirve para decidir el orden en el que se apilan, cual va adelante y cual atras */
}

.centro {
    width: 4px;
    height: 4px;
    background-color: black;
    border-radius: 50%;
    top: 50%; 
  left: 50%; 
  transform: translate(-50%, -50%); 
  z-index: 4
}

@keyframes rotate-seconds {
  0% {
    transform: translateX(-50%) rotate(0deg);
  }
  100% {
    transform: translateX(-50%) rotate(360deg);
  }
}

@keyframes rotate-minutes {
  0% {
    transform: translateX(-50%) rotate(0deg);
  }
  100% {
    transform: translateX(-50%) rotate(360deg);
  }
}

@keyframes rotate-hours {
  0% {
    transform: translateX(-50%) rotate(0deg);
  }
  100% {
    transform: translateX(-50%) rotate(360deg);
  }
}

.segundero {
  animation: rotate-seconds 60s linear infinite;
}

.minutero {
  animation: rotate-minutes 3600s linear infinite;
}

.horario {
  animation: rotate-hours 43200s linear infinite;
}
    </style>
</head>
<body>

    <div class="reloj">
        <div class="horario"></div>
        <div class="minutero"></div>
        <div class="segundero"></div>
        <div class="centro"></div>
      </div>
   
   

</body>

</html>
